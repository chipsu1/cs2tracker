<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS2 Price Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080c14;--surface:#0f1623;--panel:#161e2e;--panel2:#1c2640;
      --border:rgba(82,165,240,.12);--border2:rgba(82,165,240,.22);
      --accent:#52a5f0;--gold:#f0c040;--green:#3dd68c;--red:#f06060;
      --text:#d8e4f4;--muted:#5a7090;--muted2:#8099b8;
      --mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;--cond:'Barlow Condensed',sans-serif;
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
    .layout{display:grid;grid-template-rows:52px 1fr;height:100vh}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 18px;z-index:10}
    .body{display:grid;grid-template-columns:260px 1fr;height:100%;overflow:hidden}
    .sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .main{overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
    .main::-webkit-scrollbar{width:4px}
    .main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .logo{display:flex;align-items:center;gap:8px;font-family:var(--cond);font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);white-space:nowrap}
    .logo-sq{width:30px;height:30px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;color:#fff}
    .search-wrap{flex:1;max-width:480px;position:relative}
    .search-wrap input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:7px 14px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
    .search-wrap input:focus{border-color:var(--accent)}
    .search-wrap input::placeholder{color:var(--muted)}
    .search-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;z-index:100;display:none;max-height:320px;overflow-y:auto}
    .search-dropdown.show{display:block}
    .sdrop-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
    .sdrop-item:last-child{border-bottom:none}
    .sdrop-item:hover{background:rgba(82,165,240,.08)}
    .sdrop-item img{width:44px;height:32px;object-fit:contain}
    .sdrop-name{font-size:12px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sdrop-price{font-size:12px;color:var(--gold);font-family:var(--mono)}
    .sdrop-add{font-size:11px;color:var(--accent);white-space:nowrap}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
    .dot.off{background:var(--red)}
    .status-txt{font-size:11px;color:var(--muted2)}
    .btn{background:var(--accent);border:none;border-radius:6px;padding:7px 16px;color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .2s,transform .1s}
    .btn:hover{opacity:.85}
    .btn:active{transform:scale(.97)}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    .btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--muted2)}
    .btn.ghost:hover{border-color:var(--accent);color:var(--accent);background:rgba(82,165,240,.06)}
    .btn.sm{padding:4px 10px;font-size:11px}
    .btn.gold{background:var(--gold);color:#1a1200}
    .btn.red{background:var(--red);color:#fff}
    .sidebar-top{padding:10px 12px 0}
    .s-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 14px 4px}
    .watchlist{flex:1;overflow-y:auto}
    .watchlist::-webkit-scrollbar{width:3px}
    .watchlist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .wcard{padding:9px 14px;border-bottom:1px solid rgba(82,165,240,.05);cursor:pointer;position:relative;transition:background .15s;border-left:2px solid transparent}
    .wcard:hover{background:var(--panel)}
    .wcard.active{background:var(--panel);border-left-color:var(--accent)}
    .wc-name{font-size:12px;font-weight:500;line-height:1.3;padding-right:22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wc-row{display:flex;align-items:center;gap:8px;margin-top:3px}
    .wc-price{font-family:var(--mono);font-size:13px;color:var(--gold)}
    .wc-chg{font-family:var(--mono);font-size:10px}
    .wc-pnl{font-size:10px;color:var(--muted2);margin-top:2px;font-family:var(--mono)}
    .wc-time{font-size:10px;color:var(--muted);margin-top:1px}
    .wc-del{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:4px;border-radius:3px;transition:color .15s,background .15s}
    .wc-del:hover{color:var(--red);background:rgba(240,96,96,.1)}
    .sidebar-footer{padding:10px 12px;border-top:1px solid var(--border)}
    .refresh-note{font-size:10px;color:var(--muted);text-align:center;margin-top:6px}

    /* PORTFOLIO TABLE */
    .portfolio-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .portfolio-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .portfolio-title{font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
    .ptable{width:100%;border-collapse:collapse}
    .ptable th{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
    .ptable th.r{text-align:right}
    .ptable td{padding:10px 14px;border-bottom:1px solid rgba(82,165,240,.04);vertical-align:middle}
    .ptable td.r{text-align:right;font-family:var(--mono);font-size:13px}
    .ptable tr:last-child td{border-bottom:none}
    .ptable tr:hover td{background:rgba(82,165,240,.03)}
    .item-name-cell{display:flex;align-items:center;gap:10px}
    .item-thumb{width:40px;height:28px;object-fit:contain;flex-shrink:0}
    .item-thumb-ph{width:40px;height:28px;background:var(--panel2);border-radius:3px;flex-shrink:0}
    .iname{font-size:13px;font-weight:500}
    .imeta{font-size:10px;color:var(--muted2);margin-top:1px}

    /* STATS BAR */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
    .stat-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .stat-val{font-family:var(--mono);font-size:17px}

    /* ITEM DETAIL */
    .item-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px}
    .item-img{width:72px;height:50px;background:var(--panel);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
    .item-img img{width:100%;height:100%;object-fit:contain}
    .item-info{flex:1;min-width:0}
    .item-name{font-family:var(--cond);font-size:18px;font-weight:700}
    .item-meta2{font-size:11px;color:var(--muted2);margin-top:3px}
    .price-block{text-align:right;flex-shrink:0}
    .price-main{font-family:var(--mono);font-size:28px;color:var(--gold);line-height:1}
    .price-chg{font-family:var(--mono);font-size:12px;margin-top:4px}
    .pbox{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
    .pbox-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .pbox-title{font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
    .purch-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .purch-row{display:flex;align-items:center;gap:10px;background:var(--panel);border-radius:6px;padding:8px 12px}
    .purch-row .pr-qty{font-family:var(--mono);font-size:13px;color:var(--text);min-width:40px}
    .purch-row .pr-price{font-family:var(--mono);font-size:13px;color:var(--gold);min-width:80px}
    .purch-row .pr-cost{font-family:var(--mono);font-size:12px;color:var(--muted2);flex:1}
    .purch-row .pr-note{font-size:11px;color:var(--muted);flex:1}
    .purch-row .pr-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:3px;transition:color .15s}
    .purch-row .pr-del:hover{color:var(--red)}
    .add-purch{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
    .fg{display:flex;flex-direction:column;gap:4px}
    .fg-lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
    .fg-inp{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s}
    .fg-inp:focus{border-color:var(--accent)}
    .fg-inp.w80{width:80px}
    .fg-inp.w120{width:120px}
    .fg-inp.w180{width:180px}
    .pnl-summary{display:flex;gap:20px;padding:12px 0 0;border-top:1px solid var(--border);margin-top:10px;flex-wrap:wrap}
    .pnl-item{display:flex;flex-direction:column;gap:3px}
    .pnl-lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
    .pnl-val{font-family:var(--mono);font-size:15px}
    .chart-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
    .chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .chart-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
    .chart-tabs{display:flex;gap:4px}
    .ctab{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;color:var(--muted2);transition:all .15s}
    .ctab.active,.ctab:hover{border-color:var(--accent);color:var(--accent);background:rgba(82,165,240,.08)}
    .chart-area{position:relative;width:100%;height:170px}
    .tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
    .tag.fn{background:rgba(240,192,64,.12);color:var(--gold)}
    .tag.mw{background:rgba(82,165,240,.12);color:#82c5f0}
    .tag.ft{background:rgba(61,214,140,.12);color:var(--green)}
    .tag.ww{background:rgba(160,174,192,.12);color:#a0aec0}
    .tag.bs{background:rgba(240,96,96,.12);color:var(--red)}
    .up{color:var(--green)}.dn{color:var(--red)}.nu{color:var(--muted2)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal{background:var(--panel);border:1px solid var(--border2);border-radius:12px;padding:24px;width:440px;max-width:96vw}
    .modal-title{font-family:var(--cond);font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
    .mrow{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .mlbl{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
    .minp{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;width:100%}
    .minp:focus{border-color:var(--accent)}
    .mhint{font-size:11px;color:var(--muted);margin-top:3px}
    .mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
    .msearch-results{margin-top:6px;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;overflow:hidden;display:none;max-height:220px;overflow-y:auto}
    .msearch-results.show{display:block}
    .msr-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
    .msr-item:last-child{border-bottom:none}
    .msr-item:hover{background:rgba(82,165,240,.1)}
    .msr-item img{width:44px;height:32px;object-fit:contain}
    .msr-name{flex:1;font-size:12px}
    .msr-price{font-size:12px;font-family:var(--mono);color:var(--gold)}
    .selected-pill{background:rgba(82,165,240,.1);border:1px solid rgba(82,165,240,.3);border-radius:6px;padding:8px 12px;font-size:13px;font-weight:500;color:var(--accent)}
    .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:300;pointer-events:none}
    .toast{background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;font-size:13px;animation:tin .2s ease;max-width:300px}
    .toast.ok{border-color:rgba(61,214,140,.4)}
    .toast.err{border-color:rgba(240,96,96,.4);color:var(--red)}
    @keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted)}
    .empty-icon{font-size:52px;opacity:.2}
    .empty-title{font-size:15px;font-weight:500;color:var(--muted2)}
    .actions-row{display:flex;gap:8px;justify-content:flex-end}
  </style>
</head>
<body>
<div class="layout">
  <div class="topbar">
    <div class="logo"><div class="logo-sq">CS</div>Price Tracker</div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Szukaj skórki na Steam Market..." autocomplete="off"/>
      <div class="search-dropdown" id="searchDrop"></div>
    </div>
    <div class="topbar-right">
      <div class="dot" id="sDot"></div>
      <div class="status-txt" id="sTxt">Łączenie...</div>
      <div id="authBtn"><button class="btn ghost" onclick="openAuthModal()">Zaloguj</button></div>
    </div>
  </div>

  <div class="body">
    <div class="sidebar">
      <div class="sidebar-top">
        <button class="btn" style="width:100%;margin-bottom:4px" onclick="openModal()">+ Dodaj przedmiot</button>
      </div>
      <div class="s-label">Obserwowane (<span id="cnt">0</span>)</div>
      <div class="watchlist" id="wlist"></div>
      <div class="sidebar-footer">
        <button class="btn ghost" style="width:100%" onclick="refreshAll()" id="rafBtn">⟳ Odśwież wszystko</button>
        <div class="refresh-note" id="rafNote">Auto-odświeżanie co 1 godzinę</div>
      </div>
    </div>

    <div class="main" id="main">
      <div class="empty-state">
        <div class="empty-icon">🎯</div>
        <div class="empty-title">Brak wybranego przedmiotu</div>
        <div style="font-size:13px">Dodaj skórki z listy po lewej i śledź ich ceny</div>
        <button class="btn" style="margin-top:14px" onclick="openModal()">+ Dodaj pierwszy przedmiot</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: dodaj item -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Dodaj przedmiot</div>
    <div class="mrow">
      <div class="mlbl">Wyszukaj na Steam Market</div>
      <input class="minp" type="text" id="mSearch" placeholder="np. AK-47 | Redline" autocomplete="off"/>
      <div class="msearch-results" id="mResults"></div>
    </div>
    <div class="mrow" id="mSelRow" style="display:none">
      <div class="mlbl">Wybrany</div>
      <div class="selected-pill" id="mSelName"></div>
    </div>
    <div class="mbtns">
      <button class="btn ghost" onclick="closeModal()">Anuluj</button>
      <button class="btn" id="mAddBtn" onclick="addItem()" disabled>Dodaj</button>
    </div>
  </div>
</div>

<!-- MODAL: logowanie -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <div class="modal-title">Logowanie</div>
    <div class="mrow"><div class="mlbl">Email</div><input id="auth-email" class="minp" type="email" placeholder="email@example.com"/></div>
    <div class="mrow"><div class="mlbl">Hasło</div><input id="auth-password" class="minp" type="password" placeholder="••••••••"/></div>
    <div class="mbtns">
      <button class="btn ghost" onclick="closeAuthModal()">Anuluj</button>
      <button class="btn" onclick="login()">Zaloguj</button>
      <button class="btn gold" onclick="openRegisterModal()">Rejestracja</button>
    </div>
  </div>
</div>

<!-- MODAL: rejestracja -->
<div class="modal-overlay" id="register-modal">
  <div class="modal">
    <div class="modal-title">Rejestracja</div>
    <div class="mrow"><div class="mlbl">Email</div><input id="reg-email" class="minp" type="email" placeholder="email@example.com"/></div>
    <div class="mrow"><div class="mlbl">Hasło</div><input id="reg-password" class="minp" type="password" placeholder="••••••••"/></div>
    <div class="mrow"><div class="mlbl">Powtórz hasło</div><input id="reg-password2" class="minp" type="password" placeholder="••••••••"/></div>
    <div class="mbtns">
      <button class="btn ghost" onclick="closeRegisterModal()">Anuluj</button>
      <button class="btn gold" onclick="registerUser()">Utwórz konto</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
const API = '/api';
const $ = id => document.getElementById(id);
const fmt = p => p != null ? parseFloat(p).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})+' zł' : '—';
const fmtPct = p => (p>0?'+':'')+p.toFixed(2)+'%';

function authHeaders(json=false){
  const t=localStorage.getItem('token');
  return {...(json?{'Content-Type':'application/json'}:{}),...(t?{Authorization:'Bearer '+t}:{})};
}

let items=[], activeId=null, chart=null, chartRange='7d', fullHistory=[], mSelected=null, mSearchT=null, topSearchT=null;

function timeAgo(ts){
  if(!ts)return 'nigdy';
  const s=(Date.now()-ts)/1000;
  if(s<60)return 'przed chwilą';
  if(s<3600)return Math.floor(s/60)+' min temu';
  if(s<86400)return Math.floor(s/3600)+' h temu';
  return Math.floor(s/86400)+' d temu';
}
function wearKey(n){
  n=n.toLowerCase();
  if(n.includes('factory new'))return 'fn';
  if(n.includes('minimal wear'))return 'mw';
  if(n.includes('field-tested'))return 'ft';
  if(n.includes('well-worn'))return 'ww';
  if(n.includes('battle-scarred'))return 'bs';
  return '';
}
const WEAR={fn:'Factory New',mw:'Minimal Wear',ft:'Field-Tested',ww:'Well-Worn',bs:'Battle-Scarred'};

function toast(msg,type=''){
  const el=document.createElement('div');
  el.className='toast '+type; el.textContent=msg;
  $('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

function updateAuthUI(){
  const t=localStorage.getItem('token');
  const b=$('authBtn');
  if(t){
    const email=localStorage.getItem('userEmail')||'Konto';
    b.innerHTML=`<span style="font-size:12px;color:var(--muted2);margin-right:6px">${email}</span><button class="btn ghost sm" onclick="logout()">Wyloguj</button>`;
  } else {
    b.innerHTML=`<button class="btn ghost" onclick="openAuthModal()">Zaloguj</button>`;
  }
}

function logout(){
  localStorage.removeItem('token'); localStorage.removeItem('userEmail');
  items=[]; activeId=null;
  $('cnt').textContent='0';
  $('wlist').innerHTML='<div style="padding:20px 14px;color:var(--muted);font-size:12px;text-align:center">Zaloguj się, by zobaczyć swoje przedmioty.</div>';
  $('main').innerHTML=`<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-title">Brak wybranego przedmiotu</div><div style="font-size:13px">Dodaj skórki z listy po lewej i śledź ich ceny</div><button class="btn" style="margin-top:14px" onclick="openModal()">+ Dodaj pierwszy przedmiot</button></div>`;
  updateAuthUI(); toast('Wylogowano','ok');
}

async function checkStatus(){
  try{
    const r=await fetch(API+'/health',{signal:AbortSignal.timeout(4000)});
    if(r.ok){$('sDot').className='dot';$('sTxt').textContent='Backend online';}else throw 0;

function renderPortfolioSummary(){

    totalValue+=(it.currentPrice||0)*(it.totalQuantity||0);
    totalQty+=it.totalQuantity||0;
  });
  const pnl=totalValue-totalCost;

  const rows=items.map(it=>{

      <td class="r">${pct!=null?`<span class="${cls}">${fmtPct(pct)}</span>`:'—'}</td>
      <td class="r">${qty>0?qty+' szt.':'—'}</td>
      <td class="r">${cost>0?fmt(cost):'—'}</td>
      <td class="r">${qty>0?fmt(val):'—'}</td>

  }).join('');

  $('main').innerHTML=`
    <div class="stats-bar">
      <div class="stat"><div class="stat-lbl">Pozycje</div><div class="stat-val">${items.length} / ${items.length}</div></div>
      <div class="stat"><div class="stat-lbl">Zainwestowano</div><div class="stat-val" style="color:var(--text)">${fmt(totalCost)}</div></div>
      <div class="stat"><div class="stat-lbl">Wartość portfela</div><div class="stat-val" style="color:var(--gold)">${fmt(totalValue)}</div></div>
      <div class="stat"><div class="stat-lbl">P&L łącznie</div><div class="stat-val ${pnlCls}">${pnl>=0?'+':''}${fmt(pnl)}<div style="font-size:11px;margin-top:2px">${fmtPct(pnlPct)}</div></div></div>
    </div>
    <div class="portfolio-box">
      <div class="portfolio-hdr">
        <div class="portfolio-title">Wszystkie pozycje</div>
      </div>
      <table class="ptable">

          <th class="r">Zmiana</th>
          <th class="r">Ilość</th>

async function addPurchase(watchlistId){

  const note=$('inpNote').value.trim()||null;

  try{

      method:'POST',headers:authHeaders(true),

    });

async function deletePurchase(purchaseId,watchlistId){

function setRange(range){
  chartRange=range;
  document.querySelectorAll('.ctab').forEach(t=>{
    const l=t.textContent.trim();
    t.className='ctab'+((range==='24h'&&l==='24h')||(range==='7d'&&l==='7 dni')||(range==='30d'&&l==='30 dni')?' active':'');
  });
  renderChart();
}

function renderChart(){
  if(chart){chart.destroy();chart=null;}
  const canvas=$('chartCanvas');
  if(!canvas)return;
  const cuts={'24h':Date.now()-86400000,'7d':Date.now()-7*86400000,'30d':Date.now()-30*86400000};
  const filtered=fullHistory.filter(h=>h.ts>=(cuts[chartRange]||0));
  if(!filtered.length){
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#5a7090';ctx.font='13px Barlow,sans-serif';ctx.textAlign='center';
    ctx.fillText('Brak danych dla tego okresu',canvas.width/2,85);
    return;
  }
  const labels=filtered.map(h=>{
    const d=new Date(h.ts);
    return chartRange==='24h'?d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'});
  });
  chart=new Chart(canvas,{type:'line',data:{labels,datasets:[
    {label:'Cena min.',data:filtered.map(h=>+(h.lowest||0).toFixed(2)),borderColor:'#52a5f0',backgroundColor:'rgba(82,165,240,.06)',borderWidth:1.5,pointRadius:filtered.length>60?0:2,pointHoverRadius:4,fill:true,tension:0.3},
    {label:'Mediana',data:filtered.map(h=>+(h.median||0).toFixed(2)),borderColor:'rgba(240,192,64,.45)',borderWidth:1,borderDash:[4,3],pointRadius:0,fill:false,tension:0.3}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c2640',borderColor:'rgba(82,165,240,.3)',borderWidth:1,titleColor:'#8099b8',bodyColor:'#d8e4f4',callbacks:{label:c=>' '+c.dataset.label+': '+c.parsed.y.toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})+' zł'}}},scales:{x:{grid:{color:'rgba(82,165,240,.05)'},ticks:{color:'#5a7090',font:{size:10},maxTicksLimit:10,autoSkip:true}},y:{grid:{color:'rgba(82,165,240,.07)'},ticks:{color:'#5a7090',font:{size:10},callback:v=>v.toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2})+' zł'}}}}});
}

function updateDayChange(){
  const el=$('dayChgRow');
  if(!el||fullHistory.length<2){if(el)el.textContent='Za mało danych';return;}
  const last=fullHistory[fullHistory.length-1];
  const prev=fullHistory.find(h=>h.ts>=Date.now()-86400000)||fullHistory[0];
  if(!last.lowest||!prev.lowest)return;
  const pct=((last.lowest-prev.lowest)/prev.lowest)*100;
  const cls=pct>0.3?'up':pct<-0.3?'dn':'nu';
  el.className='price-chg '+cls;
  el.textContent=(pct>0.3?'▲':pct<-0.3?'▼':'—')+' '+Math.abs(pct).toFixed(2)+'% (24h)';
}

async function refreshOne(itemId){
  const btn=event.target;btn.disabled=true;btn.textContent='⟳ Pobieranie...';
  try{
    const r=await fetch(`${API}/refresh/${itemId}`,{method:'POST',headers:authHeaders()});
    if(!r.ok)throw 0;
    toast('Cena zaktualizowana ✓','ok');

    if(item){renderMain(item);try{const hr=await fetch(`${API}/history/${item.item_id||item.id}`,{headers:authHeaders()});fullHistory=await hr.json();}catch{fullHistory=[];}renderChart();updateDayChange();}
  }catch{toast('Błąd pobierania ceny ze Steam','err');}
  btn.disabled=false;btn.textContent='⟳ Odśwież cenę';
}

async function refreshAll(){
  const btn=$('rafBtn'),note=$('rafNote');
  btn.disabled=true;btn.textContent='⟳ Odświeżam...';note.textContent='Łączenie...';
  let response;
  try{response=await fetch(`${API}/refresh-all`,{method:'POST',headers:authHeaders()});}
  catch{toast('Błąd połączenia','err');btn.disabled=false;btn.textContent='⟳ Odśwież wszystko';note.textContent='Błąd połączenia';return;}
  if(!response.ok){toast('Błąd odświeżania','err');btn.disabled=false;btn.textContent='⟳ Odśwież wszystko';return;}
  const reader=response.body.getReader(),decoder=new TextDecoder();let buffer='';
  try{
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');buffer=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        let ev;try{ev=JSON.parse(line.slice(6));}catch{continue;}
        if(ev.type==='start')note.textContent=`Przygotowuję ${ev.total} przedmiotów...`;
        if(ev.type==='progress'){note.textContent=`${ev.index+1}/${ev.total}: ${ev.name.slice(0,22)}...`;btn.textContent=`⟳ ${ev.index+1}/${ev.total}`;}
        if(ev.type==='item_done'){
          const idx=items.findIndex(w=>String(w.item_id)===String(ev.itemId));
          if(idx!==-1){items[idx].currentPrice=ev.price.lowest_price;items[idx].currentMedian=ev.price.median_price;items[idx].currentVolume=ev.price.volume;items[idx].lastUpdated=ev.price.timestamp;renderSidebar();if(String(items[idx].id)===String(activeId))renderMain(items[idx]);}
        }
        if(ev.type==='done'){
          const now=new Date().toLocaleTimeString('pl-PL');
          note.textContent=`Zaktualizowano ${ev.updated}/${ev.total} · ${now}`;
          btn.textContent='⟳ Odśwież wszystko';btn.disabled=false;
          toast(`Odświeżono ${ev.updated} z ${ev.total} ✓`,'ok');
          await loadWatchlist();
          if(activeId){const item=items.find(w=>String(w.id)===String(activeId));if(item){renderMain(item);try{const hr=await fetch(`${API}/history/${item.item_id||item.id}`,{headers:authHeaders()});fullHistory=await hr.json();}catch{fullHistory=[];}renderChart();updateDayChange();}}
          return;
        }
        if(ev.type==='error')toast('Błąd serwera','err');
      }
    }
  }catch(e){console.error(e);toast('Połączenie przerwane','err');}
  btn.disabled=false;btn.textContent='⟳ Odśwież wszystko';
}

async function deleteItem(e,id){

    if(String(activeId)===String(id)){activeId=null;}
    toast('Usunięto','ok');

  }catch{toast('Błąd usuwania','err');}
}

      const r=await fetch(`${API}/search?q=${encodeURIComponent(q)}`,{headers:authHeaders()});
      const res=await r.json();
      if(!res.length){dd.innerHTML='<div style="padding:10px 12px;font-size:12px;color:var(--muted)">Brak wyników</div>';return;}
      dd.innerHTML=res.slice(0,6).map(it=>{const json=JSON.stringify(it).replace(/"/g,'&quot;');return `<div class="sdrop-item" onclick="quickPick(&quot;${json}&quot;)">${it.imageUrl?`<img src="${it.imageUrl}" alt=""/>`:'<div style="width:44px;height:32px"></div>'}<div class="sdrop-name">${it.name}</div><div class="sdrop-price">${it.price||'—'}</div><div class="sdrop-add">+ Dodaj</div></div>`;}).join('');
    }catch{dd.innerHTML='<div style="padding:10px 12px;font-size:12px;color:var(--red)">Backend offline</div>';}
  },400);
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))$('searchDrop').classList.remove('show');});
function quickPick(json){mSelected=JSON.parse(json);$('searchDrop').classList.remove('show');$('searchInput').value='';$('mSearch').value=mSelected.name;$('mSelName').textContent=mSelected.name;$('mSelRow').style.display='block';$('mAddBtn').disabled=false;$('modal').classList.add('show');}

// ── AUTH ──
function openAuthModal(){$('auth-email').value='';$('auth-password').value='';$('auth-modal').classList.add('show');setTimeout(()=>$('auth-email').focus(),80);}
function closeAuthModal(){$('auth-modal').classList.remove('show');}
$('auth-modal').addEventListener('click',e=>{if(e.target===$('auth-modal'))closeAuthModal();});
async function login(){
  const email=$('auth-email').value.trim(),password=$('auth-password').value;
  if(!email||!password){toast('Podaj email i hasło','err');return;}
  try{
    const res=await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    if(!res.ok){toast('Błędne dane logowania','err');return;}
    const data=await res.json();
    if(data.token){localStorage.setItem('token',data.token);localStorage.setItem('userEmail',email);}
    toast('Zalogowano ✓','ok');closeAuthModal();updateAuthUI();await loadWatchlist();
  }catch{toast('Błąd połączenia','err');}
}
function openRegisterModal(){$('reg-email').value='';$('reg-password').value='';$('reg-password2').value='';$('register-modal').classList.add('show');setTimeout(()=>$('reg-email').focus(),80);}
function closeRegisterModal(){$('register-modal').classList.remove('show');}
$('register-modal').addEventListener('click',e=>{if(e.target===$('register-modal'))closeRegisterModal();});
async function registerUser(){
  const email=$('reg-email').value.trim(),p1=$('reg-password').value,p2=$('reg-password2').value;
  if(!email||!p1||!p2){toast('Wypełnij wszystkie pola','err');return;}
  if(p1!==p2){toast('Hasła nie są takie same','err');return;}
  try{
    const res=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:p1})});
    if(!res.ok){toast('Nie udało się utworzyć konta','err');return;}
    toast('Konto utworzone ✓','ok');closeRegisterModal();openAuthModal();
  }catch{toast('Błąd połączenia','err');}
}

// INIT
updateAuthUI();
checkStatus();
loadWatchlist();
setInterval(checkStatus,30000);
setInterval(loadWatchlist,300000);
</script>
